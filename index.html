<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper Scissors</title>
    <link rel="stylesheet" href="12-rock-paper-scissors.css">
</head>
<body>
    <p class="title">
        Rock paper Scissors
    </p>

    <button class="move-button js-rock-button">
        <img class="move-icon" src="images/rock-emoji.png">
    </button>

    <button class="move-button js-paper-button">
        <img class="move-icon" src="images/paper-emoji.png">
    </button>

    <button class="move-button js-scissors-button" >
        <img class="move-icon" src="images/scissors-emoji.png">
    </button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

     <button class="reset-score-btn js-reset-button" >
        Reset Score
     </button>

     <button class="auto-play-button js-auto-play-button">
        Auto Play
     </button>
     <p class="js-confirm-reset"></p>

    <script src="12-rock-paper-scissors.js"></script>
</body>

</html>
